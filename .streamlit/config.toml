[theme]
base = "dark"
primaryColor = "#ff5b1f"
backgroundColor = "#000000"
secondaryBackgroundColor = "#0a0a0a"
textColor = "#f5f5f5"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
